<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Romantic Universe</title>
    <style>
        /* 导入高级衬线字体 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505; /* 深邃星空黑 */
            display: flex; align-items: center; justify-content: center;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
        }

        /* 动态背景：模拟星星 */
        .stars-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                        radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            animation: twinkle 10s linear infinite;
        }

        @keyframes twinkle {
            0% { transform: translate(0, 0); opacity: 0.8; }
            50% { transform: translate(-20px, -20px); opacity: 1; }
            100% { transform: translate(0, 0); opacity: 0.8; }
        }

        /* 磨砂玻璃卡片 */
        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            width: 80%; max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 2s ease-out;
        }

        /* 重点：象牙白文字，解决看不清的问题 */
        #quote {
            color: #F5F5F0; /* 象牙白 */
            font-size: 1.4rem;
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 20px;
            /* 柔和的发光感 */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 1px 1px 2px rgba(0,0,0,0.8);
        }

        .heart-icon {
            color: #E6B3B3; /* 莫兰迪粉金 */
            font-size: 1.2rem;
            opacity: 0.8;
            margin-top: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="stars-container"></div>
    <div class="card">
        <div id="quote">正在对齐星轨...</div>
        <div class="heart-icon">✦</div>
    </div>

    <script>
        const library = {
            zh: [
                "山河远阔，人间烟火，无一是你，无一不是你。",
                "月色与雪色之间，你是第三种绝色。",
                "在这个瞬间，我只看向你。",
                "纵使星河璀璨，你仍是我眼里的唯一。",
                "我曾观测过千万颗恒星，却唯独在你眼中找到了光。"
            ],
            en: [
                "You are my today and all of my tomorrows.",
                "In all the world, there is no heart for me like yours.",
                "Whatever our souls are made of, his and mine are the same.",
                "To me, you are the universe."
            ],
            fr: [
                "Je t'aime plus qu'hier et moins que demain.",
                "Tu es ma plus belle histoire d'amour.",
                "La vie est une fleur dont l'amour est le miel.",
                "Aimer, c'est regarder ensemble dans la même direction."
            ]
        };

        function displayRandomQuote() {
            const allQuotes = [...library.zh, ...library.en, ...library.fr];
            const randomQuote = allQuotes[Math.floor(Math.random() * allQuotes.length)];
            document.getElementById('quote').innerText = randomQuote;
        }

        // 执行随机显示
        displayRandomQuote();
    </script>
</body>
</html>
