<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Romantic Universe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050505;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
        }

        /* 动态星空 */
        .stars-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                        radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            animation: twinkle 12s linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            padding: 40px 20px;
            width: 85%; max-width: 360px;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            transition: all 1s ease;
        }

        /* 初始内容容器 */
        #initial-content {
            transition: opacity 0.8s ease;
        }

        #quote {
            color: #F5F5F0 !important;
            font-size: 1.3rem;
            line-height: 1.8;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        .action-btn {
            display: inline-block;
            padding: 12px 30px;
            color: #F5F5F0;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.4s ease;
        }

        /* 收款码容器：初始隐藏 */
        #qr-content {
            display: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #meituan-img {
            width: 100%;
            max-width: 280px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .heart-icon {
            color: #E6B3B3;
            font-size: 1rem;
            margin-top: 25px;
            opacity: 0.5;
        }

        /* 隐藏类 */
        .hidden { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
<body>
    <div class="stars-container"></div>
    
    <div class="card" id="mainCard">
        <div id="initial-content">
            <div id="quote">正在观测星轨...</div>
            <div class="action-btn" onclick="showQR()">解锁今日甜蜜</div>
        </div>

        <div id="qr-content">
            <div style="color: #F5F5F0; margin-bottom: 15px; font-size: 0.9rem; opacity: 0.8;">
                星光指引，长按识别支付
            </div>
            <img src="meituan_code.jpg" id="meituan-img" alt="Payment Code">
        </div>

        <div class="heart-icon">✦</div>
    </div>

    <script>
        const quotes = [
            "山河远阔，人间烟火，无一是你，无一不是你。",
            "月色与雪色之间，你是第三种绝色。",
            "纵使星河璀璨，你仍是我眼里的唯一。",
            "我曾观测过千万颗恒星，却唯独在你眼中找到了光。",
            "在 10^10 年的演化中，遇到你的概率是奇迹。"
        ];

        document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];

        function showQR() {
            const initial = document.getElementById('initial-content');
            const qr = document.getElementById('qr-content');
            
            // 1. 淡出语录
            initial.classList.add('hidden');
            
            setTimeout(() => {
                initial.style.display = 'none';
                // 2. 显示并淡入收款码
                qr.style.display = 'block';
                setTimeout(() => {
                    qr.style.opacity = '1';
                }, 50);
            }, 800);
        }
    </script>
</body>
</html>
